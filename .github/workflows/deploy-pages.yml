name: Deploy GitHub Pages

on:
  push:
    branches: ["master", "main"]
    paths:
      - "index.html"
      - "css/**"
      - "js/**"
      - "data/**"
      - "service-worker.js"
      - ".nojekyll"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare static site artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _site
          BUILD_VERSION="${GITHUB_SHA::7}"
          
          # Inject commit hash into index.html for cache-busting
          cp index.html _site/index.html
          sed -i.bak "s/const APP_BUILD = \"[^\"]*\";/const APP_BUILD = \"${BUILD_VERSION}\";/" _site/index.html
          rm -f _site/index.html.bak
          
          cp -R css js data service-worker.js .nojekyll _site/
          printf '{"build":"%s"}\n' "$BUILD_VERSION" > _site/build.json

      - name: Verify artifact contents
        shell: bash
        run: |
          set -euo pipefail
          test -f _site/index.html
          test -f _site/build.json
          test -f _site/service-worker.js
          test -d _site/js
          test -d _site/css
          test -d _site/data

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
